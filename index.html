<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PERIMETER // flashlight shooter</title>
<style>
  :root{
    --cyan: #4df3ff;
    --cyan-dim: #1c6a72;
    --red: #ff3b4e;
    --amber: #ffcf5c;
    --bg: #030507;
    --panel: rgba(6,14,16,0.72);
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Consolas', 'Courier New', monospace;
    letter-spacing: 0.04em;
    touch-action: none;
    overscroll-behavior: none;
  }
  #wrap{
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  canvas{
    display:block;
    width: 100%;
    height: 100%;
    cursor: none;
  }
  .hud{
    position: absolute;
    top: 14px;
    left: 14px;
    color: var(--cyan);
    background: var(--panel);
    border: 1px solid var(--cyan-dim);
    padding: 8px 14px;
    font-size: 12px;
    line-height: 1.7;
    text-shadow: 0 0 6px rgba(77,243,255,0.6);
    pointer-events: none;
    min-width: 150px;
  }
  .hud .label{ color: #4a7a80; margin-right: 6px; }
  .hpbar-outer{
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    margin-top: 4px;
    border: 1px solid var(--cyan-dim);
  }
  .hpbar-inner{
    height: 100%;
    background: linear-gradient(90deg, var(--cyan-dim), var(--cyan));
    width: 100%;
    transition: width 0.15s ease;
  }
  .ammobar-inner{
    height: 100%;
    background: linear-gradient(90deg, #8a6a1e, var(--amber));
    width: 100%;
    transition: width 0.1s ease;
  }
  .ammobar-inner.reloading{
    background: repeating-linear-gradient(90deg, var(--red), var(--red) 8px, #4a1015 8px, #4a1015 16px);
    animation: reloadPulse 0.5s linear infinite;
  }
  @keyframes reloadPulse{
    0%{ opacity: 0.5; } 50%{ opacity: 1; } 100%{ opacity: 0.5; }
  }
  .title{
    position: absolute;
    top: 14px;
    right: 14px;
    color: #3a5a5e;
    font-size: 11px;
    letter-spacing: 0.25em;
    pointer-events: none;
    text-align: right;
  }
  .title b{ color: var(--cyan); text-shadow: 0 0 6px rgba(77,243,255,0.5); }
  .overlay{
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(2,4,5,0.88);
    color: var(--cyan);
    text-align: center;
    z-index: 5;
  }
  .overlay.show{ display:flex; }
  .overlay h1{
    font-size: 34px;
    letter-spacing: 0.15em;
    margin: 0 0 6px 0;
    color: var(--red);
    text-shadow: 0 0 16px rgba(255,59,78,0.7);
  }
  .overlay p{
    font-size: 13px;
    color: #8ecfd6;
    margin: 4px 0 18px 0;
    letter-spacing: 0.1em;
  }
  .overlay button{
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 10px 26px;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: 0.15s;
  }
  .overlay button:hover{
    background: var(--cyan);
    color: #021012;
    box-shadow: 0 0 20px rgba(77,243,255,0.6);
  }
  .upgrade-options{
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 720px;
  }
  .upgrade-options button{
    width: 160px;
    padding: 16px 12px;
    font-size: 12px;
  }
  .upgrade-options button span{
    display: block;
    margin-top: 6px;
    font-size: 10px;
    color: #7fb7bd;
    letter-spacing: 0.05em;
  }
  .upgrade-options button:hover span{ color: #021012; }
  .hint{
    position:absolute;
    bottom: 14px;
    left: 14px;
    color: #3a5a5e;
    font-size: 11px;
    letter-spacing: 0.08em;
    pointer-events: none;
  }
  .hint b{ color: #6fb; color: var(--cyan); }
  .wave-banner{
    position: absolute;
    top: 46%;
    left: 50%;
    transform: translate(-50%,-50%);
    color: var(--cyan);
    font-size: 22px;
    letter-spacing: 0.3em;
    opacity: 0;
    pointer-events: none;
    text-shadow: 0 0 16px rgba(77,243,255,0.7);
    transition: opacity 0.4s ease;
  }
  .wave-banner.show{ opacity: 1; }
  #touchLayer{
    position: absolute;
    inset: 0;
    z-index: 3;
    touch-action: none;
    display: none;
  }
  .joybase{
    position: absolute;
    width: 96px;
    height: 96px;
    margin-left: -48px;
    margin-top: -48px;
    border-radius: 50%;
    border: 2px solid rgba(77,243,255,0.35);
    background: rgba(10,20,22,0.25);
    pointer-events: none;
    display: none;
  }
  .joybase.aimbase{
    border-color: rgba(255,77,216,0.35);
  }
  .joyknob{
    position: absolute;
    width: 44px;
    height: 44px;
    margin-left: -22px;
    margin-top: -22px;
    border-radius: 50%;
    background: rgba(77,243,255,0.35);
    box-shadow: 0 0 14px rgba(77,243,255,0.6);
    pointer-events: none;
  }
  .joyknob.aimknob{
    background: rgba(255,77,216,0.35);
    box-shadow: 0 0 14px rgba(255,77,216,0.6);
  }
  @media (pointer: coarse){
    #touchLayer{ display: block; }
    .hint{ display: none; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div class="hud">
    <div><span class="label">HP</span><span id="hpNum">100</span></div>
    <div class="hpbar-outer"><div class="hpbar-inner" id="hpBar"></div></div>
    <div><span class="label">SCORE</span><span id="score">0</span></div>
    <div><span class="label">WAVE</span><span id="wave">1</span></div>
    <div><span class="label">AMMO</span><span id="ammoNum">8</span> / <span id="ammoMax">8</span></div>
    <div class="hpbar-outer"><div class="ammobar-inner" id="ammoBar"></div></div>
  </div>

  <div class="title">PERIMETER<br><b>// night watch</b></div>

  <div class="hint">WASD move &nbsp; · &nbsp; MOUSE or ARROWS aim &nbsp; · &nbsp; CLICK or SPACE fire (hold) &nbsp; · &nbsp; R reload</div>

  <div class="wave-banner" id="waveBanner">WAVE 1</div>

  <div id="touchLayer">
    <div class="joybase" id="moveBase"></div>
    <div class="joyknob" id="moveKnob"></div>
    <div class="joybase aimbase" id="aimBase"></div>
    <div class="joyknob aimknob" id="aimKnob"></div>
  </div>

  <div class="overlay" id="upgradeScreen">
    <h1 style="color:var(--cyan); text-shadow:0 0 16px rgba(77,243,255,0.7);">WAVE CLEARED</h1>
    <p>choose one upgrade</p>
    <div class="upgrade-options">
      <button data-upgrade="ammo">+3 MAG SIZE<br><span>reload holds more rounds</span></button>
      <button data-upgrade="damage">+1 DAMAGE<br><span>bullets hit harder</span></button>
      <button data-upgrade="firerate">FASTER FIRE<br><span>shorter cooldown between shots</span></button>
      <button data-upgrade="health">+20 MAX HP<br><span>and full heal</span></button>
    </div>
  </div>

  <div class="overlay show" id="startScreen">
    <h1 style="color:var(--cyan); text-shadow:0 0 16px rgba(77,243,255,0.7);">PERIMETER</h1>
    <p>something is moving in the dark.<br>hold the line with your light.</p>
    <button id="startBtn">BEGIN WATCH</button>
  </div>

  <div class="overlay" id="gameOverScreen">
    <h1>SIGNAL LOST</h1>
    <p id="finalStats">score 0 &nbsp;·&nbsp; wave 1</p>
    <button id="restartBtn">RETRY</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const fogCanvas = document.createElement('canvas');
  const fogCtx = fogCanvas.getContext('2d');
  let W, H;
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    fogCanvas.width = W;
    fogCanvas.height = H;
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- state ----------
  const keys = {};
  const mouse = { x: W/2, y: H/2, down: false };

  let player, bullets, enemies, particles, sparks, enemyBullets;
  let score, wave, waveEnemiesLeft, waveCooldown, gameRunning, fireTimer;
  let flicker = 0;
  let paused = false;

  const TYPE_INFO = {
    chaser:   { color: '#ff3b4e', label: 'chaser' },
    sprinter: { color: '#ffcf5c', label: 'sprinter' },
    tank:     { color: '#b04dff', label: 'tank' },
    shooter:  { color: '#ff4dd8', label: 'shooter' }
  };

  let maxHp = 100;
  let magSize = 8;
  let playerDamage = 1;
  let baseFireCooldown = 0.55;
  const RELOAD_TIME = 1.1;
  let ammo = magSize;
  let reloading = false;
  let reloadTimer = 0;

  function resetGame(){
    maxHp = 100;
    magSize = 8;
    playerDamage = 1;
    baseFireCooldown = 0.55;

    player = {
      x: W/2, y: H/2,
      angle: 0,
      speed: 250,
      radius: 12,
      hp: maxHp,
      hitCooldown: 0
    };
    bullets = [];
    enemies = [];
    particles = [];
    sparks = [];
    enemyBullets = [];
    score = 0;
    wave = 0;
    waveEnemiesLeft = 0;
    waveCooldown = 0.6;
    fireTimer = 0;
    ammo = magSize;
    reloading = false;
    reloadTimer = 0;
    paused = false;
    gameRunning = true;
    updateHud();
    nextWave();
  }

  function nextWave(){
    wave += 1;
    const count = 3 + wave * 2;
    waveEnemiesLeft = count;
    document.getElementById('wave').textContent = wave;
    showWaveBanner('WAVE ' + wave);
    spawnQueue = count;
    spawnTimer = 0;
  }

  let spawnQueue = 0;
  let spawnTimer = 0;

  function showWaveBanner(text){
    const el = document.getElementById('waveBanner');
    el.textContent = text;
    el.classList.add('show');
    setTimeout(()=> el.classList.remove('show'), 1400);
  }

  function showUpgradeScreen(){
    document.getElementById('upgradeScreen').classList.add('show');
  }

  function applyUpgrade(kind){
    if(kind === 'ammo'){
      magSize += 3;
      ammo = magSize;
      reloading = false;
    } else if(kind === 'damage'){
      playerDamage += 1;
    } else if(kind === 'firerate'){
      baseFireCooldown = Math.max(0.14, baseFireCooldown - 0.1);
    } else if(kind === 'health'){
      maxHp += 20;
      player.hp = maxHp;
    }
    document.getElementById('upgradeScreen').classList.remove('show');
    paused = false;
    updateHud();
    nextWave();
  }

  // ---------- input ----------
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key === ' ') e.preventDefault();
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left;
    mouse.y = e.clientY - r.top;
  });
  canvas.addEventListener('mousedown', () => { mouse.down = true; });
  window.addEventListener('mouseup', () => { mouse.down = false; });

  // ---------- touch joystick controls (mobile) ----------
  const touchLayer = document.getElementById('touchLayer');
  const moveBase = document.getElementById('moveBase');
  const moveKnob = document.getElementById('moveKnob');
  const aimBase = document.getElementById('aimBase');
  const aimKnob = document.getElementById('aimKnob');
  const JOY_RADIUS = 48;

  const moveStick = { id: null, baseX: 0, baseY: 0, x: 0, y: 0, active: false };
  const aimStick  = { id: null, baseX: 0, baseY: 0, x: 0, y: 0, active: false };

  function showStick(baseEl, knobEl, x, y){
    baseEl.style.left = x+'px'; baseEl.style.top = y+'px';
    knobEl.style.left = x+'px'; knobEl.style.top = y+'px';
    baseEl.style.display = 'block'; knobEl.style.display = 'block';
  }
  function moveKnobTo(knobEl, baseX, baseY, dx, dy){
    knobEl.style.left = (baseX+dx)+'px';
    knobEl.style.top = (baseY+dy)+'px';
  }
  function hideStick(baseEl, knobEl){
    baseEl.style.display = 'none'; knobEl.style.display = 'none';
  }

  touchLayer.addEventListener('touchstart', e => {
    e.preventDefault();
    for(const t of e.changedTouches){
      const isLeft = t.clientX < window.innerWidth/2;
      if(isLeft && moveStick.id === null){
        moveStick.id = t.identifier;
        moveStick.baseX = t.clientX; moveStick.baseY = t.clientY;
        moveStick.x = 0; moveStick.y = 0; moveStick.active = true;
        showStick(moveBase, moveKnob, t.clientX, t.clientY);
      } else if(!isLeft && aimStick.id === null){
        aimStick.id = t.identifier;
        aimStick.baseX = t.clientX; aimStick.baseY = t.clientY;
        aimStick.x = 0; aimStick.y = 0; aimStick.active = true;
        showStick(aimBase, aimKnob, t.clientX, t.clientY);
      }
    }
  }, { passive:false });

  touchLayer.addEventListener('touchmove', e => {
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier === moveStick.id){
        let dx = t.clientX - moveStick.baseX;
        let dy = t.clientY - moveStick.baseY;
        const len = Math.hypot(dx,dy);
        if(len > JOY_RADIUS){ dx = dx/len*JOY_RADIUS; dy = dy/len*JOY_RADIUS; }
        moveStick.x = dx/JOY_RADIUS; moveStick.y = dy/JOY_RADIUS;
        moveKnobTo(moveKnob, moveStick.baseX, moveStick.baseY, dx, dy);
      } else if(t.identifier === aimStick.id){
        let dx = t.clientX - aimStick.baseX;
        let dy = t.clientY - aimStick.baseY;
        const len = Math.hypot(dx,dy);
        if(len > JOY_RADIUS){ dx = dx/len*JOY_RADIUS; dy = dy/len*JOY_RADIUS; }
        aimStick.x = dx/JOY_RADIUS; aimStick.y = dy/JOY_RADIUS;
        moveKnobTo(aimKnob, aimStick.baseX, aimStick.baseY, dx, dy);
      }
    }
  }, { passive:false });

  function endTouch(e){
    for(const t of e.changedTouches){
      if(t.identifier === moveStick.id){
        moveStick.id = null; moveStick.active = false; moveStick.x = 0; moveStick.y = 0;
        hideStick(moveBase, moveKnob);
      } else if(t.identifier === aimStick.id){
        aimStick.id = null; aimStick.active = false; aimStick.x = 0; aimStick.y = 0;
        hideStick(aimBase, aimKnob);
      }
    }
  }
  touchLayer.addEventListener('touchend', endTouch, { passive:false });
  touchLayer.addEventListener('touchcancel', endTouch, { passive:false });

  // ---------- helpers ----------
  function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }

  function spawnEnemy(){
    const edge = Math.floor(Math.random()*4);
    let x,y;
    if(edge===0){ x = Math.random()*W; y = -30; }
    else if(edge===1){ x = W+30; y = Math.random()*H; }
    else if(edge===2){ x = Math.random()*W; y = H+30; }
    else { x = -30; y = Math.random()*H; }

    // introduce a new AI type every second level
    const availableTypes = ['chaser'];
    if(wave >= 2) availableTypes.push('sprinter');
    if(wave >= 4) availableTypes.push('shooter');
    if(wave >= 6) availableTypes.push('tank');
    const type = availableTypes[Math.floor(Math.random()*availableTypes.length)];

    let en;
    if(type === 'sprinter'){
      en = {
        x, y, type,
        radius: 10,
        speed: 145 + Math.random()*30 + wave*3,
        hp: 1 + Math.floor(wave/5),
        contactDmg: 10,
        wobble: Math.random()*Math.PI*2,
        wobbleAmt: 4
      };
    } else if(type === 'tank'){
      en = {
        x, y, type,
        radius: 19,
        speed: 34 + wave*1.2,
        hp: 6 + Math.floor(wave/2),
        contactDmg: 24,
        wobble: Math.random()*Math.PI*2,
        wobbleAmt: 6
      };
    } else if(type === 'shooter'){
      en = {
        x, y, type,
        radius: 12,
        speed: 60 + wave*1.5,
        hp: 2 + Math.floor(wave/4),
        contactDmg: 8,
        wobble: Math.random()*Math.PI*2,
        wobbleAmt: 10,
        fireTimer: 0.8 + Math.random()*0.8,
        preferredRange: 320
      };
    } else {
      en = {
        x, y, type,
        radius: 13,
        speed: 55 + Math.random()*35 + wave*3,
        hp: 2 + Math.floor(wave/3),
        contactDmg: 14,
        wobble: Math.random()*Math.PI*2,
        wobbleAmt: 18
      };
    }
    en.maxHp = en.hp;
    en.hitCooldown = 0;
    en.color = TYPE_INFO[type].color;
    enemies.push(en);
  }

  function fireBullet(){
    // Always fire along the player's current facing angle. This angle is
    // already computed each frame from whichever aim source is currently
    // driving it (mouse position, arrow keys, or the mobile aim
    // joystick) -- see the aim block in update(). Previously this
    // recomputed a direction straight from mouse.x/mouse.y, which never
    // updates on touch devices (there's no mousemove), so bullets always
    // flew toward the stale initial mouse point near the center of the
    // screen regardless of where the player was aiming. That's why shots
    // mostly went "down": the player was usually above that fixed point.
    const dx = Math.cos(player.angle);
    const dy = Math.sin(player.angle);
    const spd = 620;
    bullets.push({
      x: player.x + dx*18,
      y: player.y + dy*18,
      vx: dx*spd,
      vy: dy*spd,
      life: 1.1
    });
    // muzzle spark
    sparks.push({ x: player.x + Math.cos(player.angle)*20, y: player.y + Math.sin(player.angle)*20, life: 0.08 });
  }

  function damagePlayer(amount){
    if(player.hitCooldown > 0) return;
    player.hp -= amount;
    player.hitCooldown = 0.5;
    if(player.hp <= 0){
      player.hp = 0;
      endGame();
    }
    updateHud();
  }

  function updateHud(){
    document.getElementById('hpNum').textContent = Math.max(0,Math.round(player.hp));
    document.getElementById('hpBar').style.width = Math.max(0,(player.hp/maxHp*100)) + '%';
    document.getElementById('score').textContent = score;

    const ammoBar = document.getElementById('ammoBar');
    const ammoNum = document.getElementById('ammoNum');
    document.getElementById('ammoMax').textContent = magSize;
    if(reloading){
      ammoNum.textContent = '...';
      ammoBar.classList.add('reloading');
      const pct = Math.max(0, 100 * (1 - reloadTimer/RELOAD_TIME));
      ammoBar.style.width = pct + '%';
    } else {
      ammoNum.textContent = ammo;
      ammoBar.classList.remove('reloading');
      ammoBar.style.width = (ammo/magSize*100) + '%';
    }
  }

  function endGame(){
    gameRunning = false;
    document.getElementById('finalStats').textContent = 'score ' + score + '  ·  wave ' + wave;
    document.getElementById('gameOverScreen').classList.add('show');
  }

  // ---------- update ----------
  let lastTime = performance.now();
  function update(dt){
    if(!gameRunning || paused) return;

    // movement
    let mx = 0, my = 0;
    if(keys['w']) my -= 1;
    if(keys['s']) my += 1;
    if(keys['a']) mx -= 1;
    if(keys['d']) mx += 1;
    if(moveStick.active && Math.hypot(moveStick.x, moveStick.y) > 0.12){
      mx = moveStick.x; my = moveStick.y;
    }
    const mlen = Math.hypot(mx,my) || 1;
    player.x += (mx/mlen) * player.speed * dt;
    player.y += (my/mlen) * player.speed * dt;
    player.x = Math.max(player.radius, Math.min(W-player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(H-player.radius, player.y));

    // aim: arrow keys or aim stick override mouse aim when active
    let lookX = 0, lookY = 0;
    if(keys['arrowup']) lookY -= 1;
    if(keys['arrowdown']) lookY += 1;
    if(keys['arrowleft']) lookX -= 1;
    if(keys['arrowright']) lookX += 1;
    if(aimStick.active && Math.hypot(aimStick.x, aimStick.y) > 0.15){
      lookX = aimStick.x; lookY = aimStick.y;
    }
    if(lookX !== 0 || lookY !== 0){
      player.angle = Math.atan2(lookY, lookX);
    } else {
      player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    }
    if(player.hitCooldown > 0) player.hitCooldown -= dt;

    // firing
    fireTimer -= dt;
    if(reloading){
      reloadTimer -= dt;
      if(reloadTimer <= 0){
        reloading = false;
        ammo = magSize;
      }
    }

    const wantsFire = mouse.down || keys[' '] || keys['spacebar'] || aimStick.active;
    if(wantsFire && !reloading && fireTimer <= 0){
      if(ammo > 0){
        fireBullet();
        ammo -= 1;
        fireTimer = baseFireCooldown;
        if(ammo <= 0){
          reloading = true;
          reloadTimer = RELOAD_TIME;
        }
      } else {
        reloading = true;
        reloadTimer = RELOAD_TIME;
      }
    }
    // manual reload
    if((keys['r']) && !reloading && ammo < magSize){
      reloading = true;
      reloadTimer = RELOAD_TIME;
    }

    // spawn queue
    if(spawnQueue > 0){
      spawnTimer -= dt;
      if(spawnTimer <= 0){
        spawnEnemy();
        spawnQueue--;
        spawnTimer = 0.45;
      }
    } else if(enemies.length === 0 && waveEnemiesLeft <= 0 && !paused){
      paused = true;
      showUpgradeScreen();
    }

    // bullets
    for(let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
      if(b.life<=0 || b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){
        bullets.splice(i,1); continue;
      }
    }

    // enemies
    for(let i=enemies.length-1;i>=0;i--){
      const en = enemies[i];
      const dx = player.x - en.x, dy = player.y - en.y;
      const d = Math.hypot(dx,dy) || 1;
      en.wobble += dt*4;
      if(en.hitCooldown>0) en.hitCooldown -= dt;

      if(en.type === 'shooter'){
        // keep a preferred distance, strafe, and take pot-shots
        const nx = -dy/d, ny = dx/d;
        const strafe = Math.sin(en.wobble) * en.wobbleAmt;
        if(d > en.preferredRange + 40){
          en.x += (dx/d) * en.speed * dt;
          en.y += (dy/d) * en.speed * dt;
        } else if(d < en.preferredRange - 40){
          en.x -= (dx/d) * en.speed * dt;
          en.y -= (dy/d) * en.speed * dt;
        }
        en.x += nx*strafe*dt;
        en.y += ny*strafe*dt;

        en.fireTimer -= dt;
        if(en.fireTimer <= 0 && d < 620){
          en.fireTimer = 1.7 + Math.random()*0.6;
          const spd = 300;
          enemyBullets.push({
            x: en.x, y: en.y,
            vx: (dx/d)*spd, vy: (dy/d)*spd,
            life: 2.2, dmg: 10
          });
        }
      } else {
        // chaser / sprinter / tank: close the distance, with some wobble/strafe
        const wob = Math.sin(en.wobble) * en.wobbleAmt;
        const nx = -dy/d, ny = dx/d;
        en.x += (dx/d) * en.speed * dt + nx*wob*dt;
        en.y += (dy/d) * en.speed * dt + ny*wob*dt;
      }

      // hit player
      if(d < en.radius + player.radius){
        damagePlayer(en.contactDmg);
      }

      // hit by bullets
      for(let j=bullets.length-1;j>=0;j--){
        const b = bullets[j];
        if(dist(b.x,b.y,en.x,en.y) < en.radius+4){
          bullets.splice(j,1);
          en.hp -= playerDamage;
          for(let k=0;k<5;k++){
            particles.push({
              x: en.x, y: en.y,
              vx: (Math.random()-0.5)*220, vy: (Math.random()-0.5)*220,
              life: 0.35, color: 'red'
            });
          }
          if(en.hp<=0){
            score += 10;
            waveEnemiesLeft -= 1;
            for(let k=0;k<14;k++){
              particles.push({
                x: en.x, y: en.y,
                vx: (Math.random()-0.5)*260, vy: (Math.random()-0.5)*260,
                life: 0.5, color: 'orange'
              });
            }
            enemies.splice(i,1);
            updateHud();
          }
          break;
        }
      }
    }

    // enemy bullets
    for(let i=enemyBullets.length-1;i>=0;i--){
      const b = enemyBullets[i];
      b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
      if(b.life<=0 || b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){
        enemyBullets.splice(i,1); continue;
      }
      if(dist(b.x,b.y,player.x,player.y) < player.radius+3){
        damagePlayer(b.dmg);
        enemyBullets.splice(i,1);
      }
    }

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.vx *= 0.9; p.vy *= 0.9;
      p.life -= dt;
      if(p.life<=0) particles.splice(i,1);
    }
    for(let i=sparks.length-1;i>=0;i--){
      sparks[i].life -= dt;
      if(sparks[i].life<=0) sparks.splice(i,1);
    }

    updateHud();
  }

  // ---------- draw ----------
  function drawGrid(){
    ctx.strokeStyle = 'rgba(60,100,110,0.12)';
    ctx.lineWidth = 1;
    const step = 60;
    for(let x=0;x<W;x+=step){
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
    }
    for(let y=0;y<H;y+=step){
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    }
  }

  function drawPlayer(){
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.shadowColor = '#4df3ff';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#0b1416';
    ctx.strokeStyle = '#4df3ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(16,0);
    ctx.lineTo(-10,-10);
    ctx.lineTo(-5,0);
    ctx.lineTo(-10,10);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawEnemies(){
    for(const en of enemies){
      ctx.save();
      ctx.translate(en.x, en.y);
      ctx.shadowColor = en.color;
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#120306';
      ctx.strokeStyle = en.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      if(en.type === 'shooter'){
        // diamond
        ctx.moveTo(0,-en.radius);
        ctx.lineTo(en.radius,0);
        ctx.lineTo(0,en.radius);
        ctx.lineTo(-en.radius,0);
        ctx.closePath();
      } else if(en.type === 'sprinter'){
        // small sharp triangle
        ctx.moveTo(0,-en.radius);
        ctx.lineTo(en.radius*0.9,en.radius*0.8);
        ctx.lineTo(-en.radius*0.9,en.radius*0.8);
        ctx.closePath();
      } else {
        // chaser / tank: circle
        ctx.arc(0,0,en.radius,0,Math.PI*2);
      }
      ctx.fill();
      ctx.stroke();
      // eye glow
      ctx.fillStyle = en.color;
      ctx.beginPath();
      ctx.arc(0,0,3,0,Math.PI*2);
      ctx.fill();
      ctx.restore();

      // mini hp pips
      if(en.maxHp > 1){
        const w = en.radius*1.6;
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(en.x-w/2, en.y-en.radius-10, w, 3);
        ctx.fillStyle = en.color;
        ctx.fillRect(en.x-w/2, en.y-en.radius-10, w*(en.hp/en.maxHp), 3);
      }
    }
  }

  function drawBullets(){
    ctx.fillStyle = '#ffcf5c';
    ctx.shadowColor = '#ffcf5c';
    ctx.shadowBlur = 10;
    for(const b of bullets){
      ctx.beginPath();
      ctx.arc(b.x,b.y,3.2,0,Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function drawEnemyBullets(){
    ctx.fillStyle = '#ff4dd8';
    ctx.shadowColor = '#ff4dd8';
    ctx.shadowBlur = 10;
    for(const b of enemyBullets){
      ctx.beginPath();
      ctx.arc(b.x,b.y,3.2,0,Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function drawParticles(){
    for(const p of particles){
      ctx.globalAlpha = Math.max(0,p.life/0.5);
      ctx.fillStyle = p.color === 'orange' ? '#ffcf5c' : '#ff3b4e';
      ctx.beginPath();
      ctx.arc(p.x,p.y,2.4,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    for(const s of sparks){
      ctx.globalAlpha = s.life/0.08;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x,s.y,4,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawCrosshair(){
    if(window.matchMedia('(pointer: coarse)').matches) return;
    ctx.strokeStyle = 'rgba(77,243,255,0.8)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 8, 0, Math.PI*2);
    ctx.moveTo(mouse.x-13, mouse.y);
    ctx.lineTo(mouse.x-5, mouse.y);
    ctx.moveTo(mouse.x+5, mouse.y);
    ctx.lineTo(mouse.x+13, mouse.y);
    ctx.moveTo(mouse.x, mouse.y-13);
    ctx.lineTo(mouse.x, mouse.y-5);
    ctx.moveTo(mouse.x, mouse.y+5);
    ctx.lineTo(mouse.x, mouse.y+13);
    ctx.stroke();
  }

  function applyDarkness(){
    flicker += 0.016;
    const flick = 0.90 + Math.sin(flicker*7.3)*0.015 + (Math.random()-0.5)*0.01;

    // draw the dark fog + cone cutout on a SEPARATE offscreen canvas,
    // so erasing the cone never touches the player/enemies on the main canvas
    fogCtx.clearRect(0,0,W,H);
    fogCtx.globalCompositeOperation = 'source-over';
    fogCtx.fillStyle = 'rgba(2,4,5,' + flick + ')';
    fogCtx.fillRect(0,0,W,H);

    fogCtx.globalCompositeOperation = 'destination-out';

    // cone of light
    const range = 480;
    const halfFOV = 0.5;

    // outer soft cone
    fogCtx.globalAlpha = 0.55;
    fogCtx.beginPath();
    fogCtx.moveTo(player.x, player.y);
    fogCtx.arc(player.x, player.y, range, player.angle-halfFOV, player.angle+halfFOV);
    fogCtx.closePath();
    fogCtx.fill();

    // inner brighter cone
    fogCtx.globalAlpha = 0.9;
    fogCtx.beginPath();
    fogCtx.moveTo(player.x, player.y);
    fogCtx.arc(player.x, player.y, range*0.62, player.angle-halfFOV*0.7, player.angle+halfFOV*0.7);
    fogCtx.closePath();
    fogCtx.fill();

    // ambient glow around player
    const grad = fogCtx.createRadialGradient(player.x,player.y,0,player.x,player.y,90);
    grad.addColorStop(0,'rgba(0,0,0,1)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    fogCtx.globalAlpha = 1;
    fogCtx.fillStyle = grad;
    fogCtx.beginPath();
    fogCtx.arc(player.x,player.y,90,0,Math.PI*2);
    fogCtx.fill();

    fogCtx.globalCompositeOperation = 'source-over';
    fogCtx.globalAlpha = 1;

    // composite the fog layer onto the main canvas (does not erase entities below)
    ctx.drawImage(fogCanvas, 0, 0);
  }

  function render(){
    ctx.fillStyle = '#03080a';
    ctx.fillRect(0,0,W,H);
    drawGrid();
    drawParticles();
    drawEnemies();
    drawBullets();
    drawEnemyBullets();
    drawPlayer();

    applyDarkness();

    drawCrosshair();
  }

  // ---------- loop ----------
  function loop(now){
    const dt = Math.min(0.033, (now-lastTime)/1000);
    lastTime = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ---------- UI wiring ----------
  document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('startScreen').classList.remove('show');
    resetGame();
  });
  document.getElementById('restartBtn').addEventListener('click', () => {
    document.getElementById('gameOverScreen').classList.remove('show');
    resetGame();
  });
  document.querySelectorAll('#upgradeScreen button').forEach(btn => {
    btn.addEventListener('click', () => applyUpgrade(btn.dataset.upgrade));
  });

  // init idle state so canvas isn't blank behind start screen
  player = { x: W/2, y: H/2, angle:0, radius:12, hp:maxHp, hitCooldown:0 };
  enemies = []; bullets = []; particles = []; sparks = []; enemyBullets = [];
  gameRunning = false;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
